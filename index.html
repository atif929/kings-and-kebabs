    <!-- Font loading: preconnect first for faster handshake, then the stylesheet.
         font-display=swap avoids invisible text while fonts load.
         Fraunces: warm, characterful soft-serif for headings + logo (italic
         weights included for the logo's distinct treatment — see Logo.module.css).
         Plus Jakarta Sans: modern, highly legible body text. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
